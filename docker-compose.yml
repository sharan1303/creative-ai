services:
  app:
    build: .
    container_name: creative-ai
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
      - ./assets:/app/assets
    working_dir: /app
    # Run FastAPI app with uvicorn
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    ports:
      - "8000:8000"

  redis:
    image: redis:7-alpine
    container_name: creative-ai-redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: creative-ai-worker
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
      - ./assets:/app/assets
    env_file:
      - .env
    depends_on:
      - redis
    working_dir: /app
    command: ["celery", "-A", "src.celery_app.celery_app", "worker", "--loglevel", "INFO"]

  agent:
    build: .
    container_name: creative-ai-agent
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
      - ./assets:/app/assets
    env_file:
      - .env
    depends_on:
      - redis
      - mcp-server
    working_dir: /app
    command: ["uv", "run", "-m", "src.cli", "monitor"]
    restart: unless-stopped
    environment:
      - MCP_SERVER_URL=http://mcp-server:8001

  mcp-server:
    build: .
    container_name: creative-ai-mcp
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
      - ./assets:/app/assets
    env_file:
      - .env
    working_dir: /app
    command: ["uv", "run", "-m", "src.mcp.server"]
    ports:
      - "8001:8001"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

