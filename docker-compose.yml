version: "3.9"

services:
  app:
    build: .
    container_name: creative-ai
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
      - ./assets:/app/assets
    working_dir: /app
    command: ["python", "-m", "src.cli", "--brief", "examples/brief_single_product.json"]
    # If you later add FastAPI with uvicorn, replace command accordingly
    # command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

